{% extends 'base.html' %}

{% block title %}Admin Control Login - ClearDerm{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width: 520px;">
        <div class="text-center mb-4">
            <i class="fas fa-user-shield" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 15px;"></i>
            <h2>Admin Control Panel</h2>
            <p class="text-muted">Login with staff/superuser account</p>
        </div>
        <form method="post" action="{% url 'adminpanel_login' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label"><i class="fas fa-user me-2"></i>Username</label>
                {{ form.username }}
            </div>
            <div class="mb-4">
                <label class="form-label"><i class="fas fa-lock me-2"></i>Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
